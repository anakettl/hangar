services:
  hangar-db:
    image: postgres:15-alpine
    container_name: hangar-db
    environment:
      - POSTGRES_DB=hangar_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=senha_forte
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d hangar_db"]
      interval: 5s
      timeout: 5s
      retries: 5
  hangar-app:
    build: .
    container_name: hangar-app
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - SPRING_DATASOURCE_URL=jdbc:postgresql://hangar-db:5432/hangar_db
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=senha_forte
      - DB_HOST=hangar-db
      - DB_PORT=5432
      - DB_NAME=hangar_db
      - DB_USER=admin
      - DB_PASSWORD=senha_forte
    depends_on:
      hangar-db:
        condition: service_healthy
  hangar-db-test:
    image: postgres:15-alpine
    container_name: hangar-db-test
    environment:
      - POSTGRES_DB=hangar_test
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=senha_forte
