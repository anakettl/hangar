services:
  hangar-db:
    image: postgres:15-alpine
    container_name: hangar-db
    environment:
      - POSTGRES_DB=hangar_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=senha_forte
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d hangar_db"]
      interval: 5s
      timeout: 5s
      retries: 5
