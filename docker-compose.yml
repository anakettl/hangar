services:
  hangar-db:
    image: postgres:15-alpine
    container_name: hangar-db
    environment:
      - POSTGRES_DB=hangar_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=senha_forte
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d hangar_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  hangar-app:
    build: .
    container_name: hangar-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://hangar-db:5432/hangar_db
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=senha_forte
      - SPRING_JPA_HIBERNATE_DDL_AUTO=validate
      - SPRING_FLYWAY_BASELINE_ON_MIGRATE=true
    depends_on:
      hangar-db:
        condition: service_healthy
